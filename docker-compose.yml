services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pay
      POSTGRES_PASSWORD: pay
      POSTGRES_DB: pay
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pay -d pay"]
      interval: 3s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10

  migrate:
    build: .
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://pay:pay@postgres:5432/pay
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://pay:pay@postgres:5432/pay
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      API_KEY: dev-api-key-change-me
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  consumer:
    build: .
    command: python -m app.consumer_main
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://pay:pay@postgres:5432/pay
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
